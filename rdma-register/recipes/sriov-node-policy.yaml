apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkNodePolicy
metadata:
  name: rdma-mlx5-pfs
  namespace: nvidia-network-operator
spec:
  nodeSelector:
    sriov: enabled

  resourceName: rdma_net

  numVfs: 16

  deviceType: netdevice
  isRdma: true

  mtu: 9000

  nicSelector:
    pfNames:
    - enp60s0f0np0
    - enp60s0f1np1
    - enp77s0f0np0
    - enp77s0f1np1
    - enp188s0f0np0
    - enp188s0f1np1
    - enp220s0f0np0
    - enp220s0f1np1
