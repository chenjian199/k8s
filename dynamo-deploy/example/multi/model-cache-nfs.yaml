apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-nfs
  namespace: dynamo-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: "model-cache-pv"
  volumeName: "model-cache-pv"
  resources:
    requests:
      storage: 700Gi