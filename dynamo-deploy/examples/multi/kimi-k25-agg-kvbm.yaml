apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-agg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache-nfs
      create: false

  services:
    Frontend:
      volumeMounts:
        - name: model-cache-nfs
          mountPoint: /nfs
      componentType: frontend
      replicas: 1
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: bdsz-node0002.192.168.4.6
        mainContainer:
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 180
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"

    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      multinode:
        nodeCount: 2
      volumeMounts:
        - name: model-cache-nfs
          mountPoint: /nfs
      resources:
        limits:
          gpu: "8"          # 每个物理节点 8 卡
          custom:
            rdma/rdma_roce: "8"  
            ephemeral-storage: "50Gi"   
        requests:
          gpu: "8"
          custom:
            rdma/rdma_roce: "8"  
            ephemeral-storage: "50Gi"   
      sharedMemory:
        size: 80Gi
      extraPodSpec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - bdsz-node0002.192.168.4.6
                        - bdsz-node0003.192.168.4.14
        mainContainer:
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 900
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - /bin/sh
            - -c
          args:
            - |
              python3 -m dynamo.vllm \
                --model "${MODEL_PATH}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --tensor-parallel-size 16 \
                --trust-remote-code \
                --gpu-memory-utilization 0.90 \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
                --dyn-reasoning-parser kimi_k25 \
                --dyn-tool-call-parser kimi_k2
          env:
            - name: MODEL_PATH
              value: /nfs/kimi-K2.5-NVFP4
            - name: SERVED_MODEL_NAME
              value: kimi-k25
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"