apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-disagg-kvbm-1p1d-rdma
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache-nfs
      create: false
  services:
    Frontend:
      volumeMounts:
        - name: model-cache-nfs
          mountPoint: /nfs
      componentType: frontend
      replicas: 1
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: bdsz-node0002.192.168.4.6
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
    VllmDecodeWorker:
      #envFromSecret: hf-token-secret
      volumeMounts:
        - name: model-cache-nfs
          mountPoint: /nfs
      componentType: worker
      replicas: 1
      resources:
        limits:
          custom:
            rdma/rdma_roce0: "1"
          gpu: "1"
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: bdsz-node0002.192.168.4.6
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
            - --model
            - /nfs/nfs/models/deepseek-ai/DeepSeek-R1-Distill-Llama-8B
            - --disaggregation-mode
            - decode
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            - --max-model-len
            - "32000"
            - --enforce-eager
    VllmPrefillWorker:
      volumeMounts:
        - name: model-cache-nfs 
          mountPoint: /nfs
      #envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        requests:
          custom:
            rdma/rdma_roce0: "1"
          gpu: "1"
          memory: "100Gi"
        limits:
          custom:
            rdma/rdma_roce0: "1"
          gpu: "1"
          memory: "100Gi"
      envs:
        - name: DYN_KVBM_CPU_CACHE_GB
          value: "100"
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: bdsz-node0003.192.168.4.14
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
            - --model
            - /nfs/nfs/models/deepseek-ai/DeepSeek-R1-Distill-Llama-8B
            - --disaggregation-mode
            - prefill
            - --max-model-len
            - "32000"
            - --enforce-eager
            - --kv-transfer-config
            - '{"kv_connector":"PdConnector","kv_role":"kv_both","kv_connector_extra_config":{"connectors":[{"kv_connector":"DynamoConnector","kv_connector_module_path":"kvbm.vllm_integration.connector","kv_role":"kv_both"},{"kv_connector":"NixlConnector","kv_role":"kv_both"}]},"kv_connector_module_path":"kvbm.vllm_integration.connector"}'
